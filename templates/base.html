<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Lending Dashboard" }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="{{ page }}">
    <div class="page-shell">
        <header class="hero">
            <div class="hero-glow hero-glow-left"></div>
            <div class="hero-glow hero-glow-right"></div>
            <div class="hero-copy">
                <h1>{{ hero_title }}</h1>
            </div>
        </header>

        <nav class="section-nav">
            <a class="{% if page == 'overview' %}active{% endif %}" href="/">Data & Market</a>
            <a class="{% if page == 'brokers' %}active{% endif %}" href="/brokers">Broker Analysis</a>
            <a class="{% if page == 'lenders' %}active{% endif %}" href="/lenders">Lender Analysis</a>
            <a class="{% if page == 'lawyers' %}active{% endif %}" href="/lawyers">Lawyer Analysis</a>
        </nav>

        <main class="stack">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
